<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Shop</title>
    <link href="/webjars/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .product-card {
            border: none;
            border-radius: 15px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            overflow: hidden;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15) !important;
        }
        .product-img {
            height: 200px;
            object-fit: cover;
        }
        .category-link {
            display: block;
            padding: 8px 12px;
            border-radius: 8px;
            text-decoration: none;
            color: #495057;
            transition: all 0.2s ease;
        }
        .category-link:hover {
            background: #0d6efd;
            color: white;
        }
        .price-tag {
            font-size: 1.2rem;
            font-weight: 700;
            color: #28a745;
        }
    </style>
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🛒 MyShop</a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
               <li class="nav-item">
                <span class="navbar-text text-white me-3">
            👤 <span th:text="${loggedInUser}"></span>
                 </span>
               </li>
                <li class="nav-item">
                    <a class="nav-link" href="/order/my-orders">📦 My Orders</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/cart">🛒 Cart</a>
                </li>
                <li class="nav-item" th:if="${isAdmin}">
                    <a class="btn btn-warning ms-2" href="/admin">⚙️ Admin</a>
                </li>
                <li class="nav-item">
                    <a class="btn btn-outline-danger ms-2" href="/logout">Logout</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Page Header -->
<div class="bg-dark text-white py-4 mb-4">
    <div class="container">
        <h2 class="mb-0 fw-bold">🛍️ Our Products</h2>
        <p class="mb-0 opacity-75">Discover our amazing collection</p>
    </div>
</div>

<div class="container mb-5">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-3">
            <div class="card shadow-sm mb-3" style="border:none; border-radius:15px;">
                <div class="card-body">
                    <h6 class="fw-bold text-uppercase text-muted mb-3">
                        📂 Categories
                    </h6>
                    <a href="/shop" class="category-link">🏠 All Products</a>
                    <a th:each="cat : ${categories}"
                       th:href="@{/shop/category/{id}(id=${cat.id})}"
                       th:text="${cat.name}"
                       class="category-link">
                    </a>
                </div>
            </div>
            <div class="card shadow-sm" style="border:none; border-radius:15px;">
                <div class="card-body">
                    <h6 class="fw-bold text-uppercase text-muted mb-3">
                        🔍 Search
                    </h6>
                    <form th:action="@{/shop/search}" method="get">
                        <div class="input-group">
                            <input type="text" name="keyword"
                                   class="form-control"
                                   th:value="${keyword}"
                                   placeholder="Search...">
                            <button class="btn btn-primary" type="submit">🔍</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Products Grid -->
        <div class="col-md-9">
            <div th:if="${keyword}" class="alert alert-info mb-3">
                Search results for: <strong th:text="${keyword}"></strong>
            </div>
            <div th:if="${products == null or #lists.isEmpty(products)}"
                 class="text-center py-5">
                <div class="fs-1">😕</div>
                <h4>No products found!</h4>
                <a href="/shop" class="btn btn-primary mt-2">View All Products</a>
            </div>
            <div class="row g-4">
                <div th:each="product : ${products}" class="col-md-4">
                    <div class="card product-card shadow-sm h-100">
                        <div style="overflow:hidden;">
                            <img th:src="${product.imageUrl}"
                                 class="product-img w-100"
                                 onerror="this.src='https://via.placeholder.com/300x200'">
                        </div>
                        <div class="card-body">
                            <h6 class="fw-bold" th:text="${product.name}"></h6>
                            <p class="price-tag" th:text="'$' + ${product.price}"></p>
                            <p class="text-muted small" th:text="${product.description}"></p>
                        </div>
                        <div class="card-footer bg-white border-0 pb-3">
                            <a th:href="@{/shop/product/{id}(id=${product.id})}"
                               class="btn btn-primary w-100">
                                View Details →
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-white py-3 mt-4">
    <div class="container text-center">
        <p class="mb-0 opacity-75">© 2026 MyShop. Built with Spring Boot ❤️</p>
    </div>
</footer>

<script src="/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
