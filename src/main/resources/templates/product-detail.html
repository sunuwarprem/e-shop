<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${product.name}">Product Detail</title>
    <link href="/webjars/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🛒 My eCommerce Store</a>
        <div class="d-flex">
            <a href="/cart" class="btn btn-outline-light me-2">🛒 Cart</a>
            <a href="/logout" class="btn btn-outline-danger">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row">

        <!-- Product Image -->
        <div class="col-md-5">
            <img th:src="${product.imageUrl}"
                 class="img-fluid rounded shadow"
                 style="width: 100%; height: 400px; object-fit: cover;"
                 onerror="this.src='https://via.placeholder.com/400x400'">
        </div>

        <!-- Product Info -->
        <div class="col-md-7">
            <h2 th:text="${product.name}"></h2>
            <h4 class="text-success" th:text="'$' + ${product.price}"></h4>

            <p class="text-muted" th:text="${product.description}"></p>

            <p>
                <span class="badge bg-secondary"
                      th:text="${product.category.name}">
                </span>
            </p>

            <p th:if="${product.stock > 0}" class="text-success">
                ✅ In Stock (<span th:text="${product.stock}"></span> available)
            </p>
            <p th:if="${product.stock == 0}" class="text-danger">
                ❌ Out of Stock
            </p>

            <div class="mt-3">
                <a href="/shop" class="btn btn-outline-secondary me-2">
                    ← Back to Shop
                </a>
                <form th:action="@{/cart/add/{id}(id=${product.id})}"
                      method="post" style="display:inline">
                    <div class="mb-3">
                        <label>Quantity:</label>
                        <input type="number"
                               name="quantity"
                               value="1"
                               min="1"
                               th:max="${product.stock}"
                               class="form-control w-25 d-inline">
                    </div>
                    <button type="submit"
                            class="btn btn-primary"
                            th:disabled="${product.stock == 0}">
                        🛒 Add to Cart
                    </button>
                </form>
            </div>
        </div>

    </div>
</div>
</body>
</html>
