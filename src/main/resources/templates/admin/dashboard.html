<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
    <link href="/webjars/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/admin">⚙️ Admin Panel</a>
        <div class="d-flex">
            <a href="/admin/products" class="btn btn-outline-light me-2">Products</a>
            <a href="/admin/orders" class="btn btn-outline-light me-2">Orders</a>
            <a href="/shop" class="btn btn-outline-light me-2">Shop</a>
            <a href="/logout" class="btn btn-outline-danger">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h3>Welcome, Admin! 👋</h3>
    <hr>
    <div class="row mt-3">

        <div class="col-md-4">
            <div class="card text-white bg-primary shadow">
                <div class="card-body text-center">
                    <h2 th:text="${totalProducts}"></h2>
                    <p class="mb-0">Total Products</p>
                </div>
                <div class="card-footer text-center">
                    <a href="/admin/products" class="text-white">Manage Products →</a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-white bg-success shadow">
                <div class="card-body text-center">
                    <h2 th:text="${totalOrders}"></h2>
                    <p class="mb-0">Total Orders</p>
                </div>
                <div class="card-footer text-center">
                    <a href="/admin/orders" class="text-white">Manage Orders →</a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-white bg-warning shadow">
                <div class="card-body text-center">
                    <h2 th:text="${totalCategories}"></h2>
                    <p class="mb-0">Total Categories</p>
                </div>
                <div class="card-footer text-center">
                    <a href="/admin/products/add" class="text-white">Add Product →</a>
                </div>
            </div>
        </div>

    </div>
</div>
</body>
</html>
