<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin - Products</title>
    <link href="/webjars/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/admin">⚙️ Admin Panel</a>
        <div class="d-flex">
            <a href="/admin/products" class="btn btn-outline-light me-2">Products</a>
            <a href="/admin/orders" class="btn btn-outline-light me-2">Orders</a>
            <a href="/shop" class="btn btn-outline-light me-2">Shop</a>
            <a href="/logout" class="btn btn-outline-danger">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>📦 Products</h3>
        <a href="/admin/products/add" class="btn btn-primary">+ Add Product</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-hover">
                <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Image</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="product : ${products}">
                    <td th:text="${product.id}"></td>
                    <td>
                        <img th:src="${product.imageUrl}"
                             style="width:50px; height:50px; object-fit:cover;"
                             class="rounded">
                    </td>
                    <td th:text="${product.name}"></td>
                    <td th:text="${product.category.name}"></td>
                    <td th:text="'$' + ${product.price}"></td>
                    <td th:text="${product.stock}"></td>
                    <td>
                        <a th:href="@{/admin/products/edit/{id}(id=${product.id})}"
                           class="btn btn-sm btn-warning me-1">Edit</a>
                        <a th:href="@{/admin/products/delete/{id}(id=${product.id})}"
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('Delete this product?')">
                            Delete
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
