<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin - Product Form</title>
    <link href="/webjars/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/admin">⚙️ Admin Panel</a>
        <div class="d-flex">
            <a href="/admin/products" class="btn btn-outline-light me-2">Products</a>
            <a href="/admin/orders" class="btn btn-outline-light me-2">Orders</a>
            <a href="/logout" class="btn btn-outline-danger">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h4 th:text="${product.id == null} ? 'Add Product' : 'Edit Product'"></h4>
                    <hr>
                    <form th:action="@{/admin/products/save}"
                          th:object="${product}"
                          method="post"
                          enctype="multipart/form-data">

                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label>Product Name</label>
                            <input type="text" th:field="*{name}"
                                   class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Description</label>
                            <textarea th:field="*{description}"
                                      class="form-control" rows="3"></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>Price</label>
                                <input type="number" th:field="*{price}"
                                       step="0.01" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Stock</label>
                                <input type="number" th:field="*{stock}"
                                       class="form-control" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label>Product Image</label>
                            <input type="file" name="imageFile"
                                   class="form-control" accept="image/*">
                            <small class="text-muted">Leave empty to keep existing image</small>
                        </div>
                        <div class="mb-3" th:if="${product.imageUrl != null}">
                            <label>Current Image</label><br>
                            <img th:src="${product.imageUrl}"
                                 style="width:100px; height:100px; object-fit:cover;"
                                 class="rounded border">
                        </div>
                        <div class="mb-3">
                            <label>Category</label>
                            <select th:field="*{category.id}"
                                    class="form-select">
                                <option th:each="cat : ${categories}"
                                        th:value="${cat.id}"
                                        th:text="${cat.name}">
                                </option>
                            </select>
                        </div>
                        <div class="d-flex justify-content-between">
                            <a href="/admin/products"
                               class="btn btn-outline-secondary">
                                ← Cancel
                            </a>
                            <button type="submit" class="btn btn-success">
                                💾 Save Product
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
