<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Shopping Cart</title>
    <link href="/webjars/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🛒 My eCommerce Store</a>
        <div class="d-flex">
            <a href="/shop" class="btn btn-outline-light me-2">Shop</a>
            <a href="/logout" class="btn btn-outline-danger">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h3>🛒 Shopping Cart
        <span class="badge bg-primary" th:text="${cartCount}"></span>
    </h3>

    <!-- Empty Cart -->
    <div th:if="${#lists.isEmpty(cartItems)}" class="alert alert-info mt-3">
        Your cart is empty!
        <a href="/shop">Continue Shopping</a>
    </div>

    <!-- Cart Items -->
    <div th:if="${!#lists.isEmpty(cartItems)}">
        <div class="card shadow-sm">
            <div class="card-body">
                <table class="table">
                    <thead>
                    <tr>
                        <th>Product</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Subtotal</th>
                        <th>Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${cartItems}">
                        <td th:text="${item.productName}"></td>
                        <td th:text="'$' + ${item.price}"></td>
                        <td>
                            <form th:action="@{/cart/update/{id}(id=${item.productId})}"
                                  method="post">
                                <div class="input-group" style="width: 120px">
                                    <input type="number"
                                           name="quantity"
                                           th:value="${item.quantity}"
                                           min="0"
                                           class="form-control form-control-sm">
                                    <button class="btn btn-sm btn-outline-secondary"
                                            type="submit">✓</button>
                                </div>
                            </form>
                        </td>
                        <td th:text="'$' + ${item.subtotal}"></td>
                        <td>
                            <form th:action="@{/cart/remove/{id}(id=${item.productId})}"
                                  method="post">
                                <button class="btn btn-sm btn-danger"
                                        type="submit">Remove</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Total & Checkout -->
        <div class="row mt-3">
            <div class="col-md-6 offset-md-6">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5>Order Summary</h5>
                        <hr>
                        <div class="d-flex justify-content-between">
                            <span>Total:</span>
                            <strong class="text-success"
                                    th:text="'$' + ${total}"></strong>
                        </div>
                        <hr>
                        <a href="/order/checkout"
                           class="btn btn-success w-100 mt-2">
                            Proceed to Checkout
                        </a>
                        <a href="/cart/clear"
                           class="btn btn-outline-danger w-100 mt-2">
                            Clear Cart
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
