<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Order Confirmed!</title>
    <link href="/webjars/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🛒 My eCommerce Store</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card shadow">
                <div class="card-body p-5">
                    <h1>🎉</h1>
                    <h3 class="text-success">Order Placed Successfully!</h3>
                    <hr>
                    <p class="text-muted">Thank you for your purchase!</p>

                    <div class="alert alert-info">
                        <strong>Order ID:</strong>
                        <span th:text="${order.id}"></span>
                    </div>

                    <div class="alert alert-secondary">
                        <strong>Status:</strong>
                        <span th:text="${order.status}"></span>
                    </div>

                    <div class="alert alert-success">
                        <strong>Total:</strong>
                        <span th:text="'$' + ${order.totalAmount}"></span>
                    </div>

                    <div class="alert alert-light">
                        <strong>Shipping to:</strong>
                        <span th:text="${order.shippingAddress}"></span>
                    </div>

                    <hr>
                    <a href="/shop" class="btn btn-primary me-2">
                        Continue Shopping
                    </a>
                    <a href="/order/my-orders" class="btn btn-outline-secondary">
                        My Orders
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
